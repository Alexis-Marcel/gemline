name: deploy

# GitOps flow: build the images, push them to GHCR with a SHA tag, then
# commit the new tag into deploy/k8s/kustomization.yaml. ArgoCD watches
# the repo and rolls the cluster forward when it sees the commit.

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "web/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "web/Dockerfile"
      - "web/Caddyfile"
      - "deploy/k8s/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_SERVER: ghcr.io/${{ github.repository_owner }}/gemline-server
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/gemline-web

# We avoid two parallel deploys racing on the manifests bump.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_SERVER }}:${{ github.sha }}
            ${{ env.IMAGE_SERVER }}:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          tags: |
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
            ${{ env.IMAGE_WEB }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  bump-manifest:
    # Edit the kustomization image tag and push back. ArgoCD's auto-sync
    # picks the commit up within a minute and rolls the cluster.
    needs: [build-server, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token that can push: GITHUB_TOKEN is enough because we
          # only need contents:write on this repo.
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install kustomize
        run: |
          curl -sLo /tmp/kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/
      - name: Pin images to the commit SHA
        working-directory: deploy/k8s
        run: |
          kustomize edit set image \
            ${{ env.IMAGE_SERVER }}=${{ env.IMAGE_SERVER }}:${{ github.sha }}
          kustomize edit set image \
            ${{ env.IMAGE_WEB }}=${{ env.IMAGE_WEB }}:${{ github.sha }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet deploy/k8s/kustomization.yaml; then
            echo "no manifest change — skipping commit"
            exit 0
          fi
          git add deploy/k8s/kustomization.yaml
          git commit -m "deploy: bump images to ${GITHUB_SHA::7}

[skip ci]"
          # Pull-rebase in case another deploy raced us (concurrency:
          # group:deploy makes this unlikely but it's cheap insurance).
          git pull --rebase origin main
          git push
