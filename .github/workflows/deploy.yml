name: deploy

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "web/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "web/Dockerfile"
      - "web/Caddyfile"
      - "deploy/k8s/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_SERVER: ghcr.io/${{ github.repository_owner }}/gemline-server
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/gemline-web

jobs:
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_SERVER }}:${{ github.sha }}
            ${{ env.IMAGE_SERVER }}:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          tags: |
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
            ${{ env.IMAGE_WEB }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  rollout:
    needs: [build-server, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Pin images to the new SHA
        run: |
          cd deploy/k8s
          kubectl kustomize . >/dev/null  # syntax check
          # Build a temporary kustomization with the SHA tag and apply it.
          cat > kustomization.runtime.yaml <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          resources: [kustomization.yaml]
          images:
            - name: ${{ env.IMAGE_SERVER }}
              newTag: ${{ github.sha }}
            - name: ${{ env.IMAGE_WEB }}
              newTag: ${{ github.sha }}
          EOF
      - name: Apply
        run: |
          kubectl apply -k deploy/k8s/
          kubectl -n gemline set image deployment/gemline-server \
            server=${{ env.IMAGE_SERVER }}:${{ github.sha }}
          kubectl -n gemline set image deployment/gemline-web \
            web=${{ env.IMAGE_WEB }}:${{ github.sha }}
      - name: Wait for rollout
        run: |
          kubectl -n gemline rollout status deployment/gemline-server --timeout=2m
          kubectl -n gemline rollout status deployment/gemline-web --timeout=2m
