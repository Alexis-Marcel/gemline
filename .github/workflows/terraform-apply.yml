# Terraform Apply on push to main.
#
# Triggered when a commit lands on main that touches deploy/terraform/**
# (typically via PR merge). Pauses on the `production` GitHub
# Environment until a required reviewer clicks Approve, then runs
# terraform apply -auto-approve.
#
# Auth: zero long-lived secrets in GitHub.
#   - AWS state: OIDC -> arn:aws:iam::386324384913:role/gemline-tf-apply
#     (write-enabled — has s3:PutObject on the state file)
#   - Infisical: OIDC -> machine identity scoped to ref:refs/heads/main
#     (separate from the plan identity, mirroring the IAM split)
#
# Why the plan workflow doesn't run apply itself: PR plans run before
# merge and use a read-only role. Once the PR is merged, we need a
# *fresh* invocation against the committed code, with a write role,
# behind a human gate. That's this workflow.

name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'deploy/terraform/**'
      - '.github/workflows/terraform-apply.yml'

permissions:
  contents: read         # checkout
  id-token: write        # OIDC JWT request

concurrency:
  # Serialize: never two applies at once on the same state. A second
  # push waits behind the first rather than racing for the DynamoDB
  # lock. cancel-in-progress: false because an apply mid-flight must
  # NOT be cancelled — that risks half-applied resources.
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    # This is the approval gate. The job pauses here until a required
    # reviewer of the `production` environment clicks Approve in the
    # workflow run UI. Configured at:
    #   https://github.com/Alexis-Marcel/gemline/settings/environments
    environment: production
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      # SHA-pinned actions: see terraform-plan.yml for the rationale and
      # how to bump.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: AWS OIDC auth
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::386324384913:role/gemline-tf-apply
          aws-region: eu-west-3

      - name: Infisical OIDC + fetch secrets
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995  # v1.0.16
        with:
          method: oidc
          domain: https://eu.infisical.com
          identity-id: 423b475e-dd1a-427b-adfe-0dd9dcb2b7ed
          oidc-audience: 423b475e-dd1a-427b-adfe-0dd9dcb2b7ed
          project-slug: gemline
          env-slug: prod
          secret-path: /

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: 1.14.5

      - name: terraform init
        run: terraform init -input=false -lockfile=readonly

      # Re-validate against the merged main commit, in case anything
      # slipped through PR checks (admin merge, force-push, etc.).
      - name: terraform validate
        run: terraform validate

      # Plan-then-apply pattern: compute the plan once, save it to a
      # file, then apply that exact plan. Guarantees that what's applied
      # matches what was just computed (no second refresh that could
      # show a different reality). The plan binary is also archived as
      # an artifact for audit.
      - name: terraform plan (post-approval)
        id: plan
        env:
          TF_VAR_hcloud_token: ${{ env.HCLOUD_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ env.CLOUDFLARE_API_TOKEN }}
          TF_VAR_kubeapi_allowed_ips: ${{ env.KUBEAPI_ALLOWED_IPS }}
        run: |
          set -o pipefail
          terraform plan -out=tfplan.bin -input=false -no-color 2>&1 | tee plan.txt

      # Archive the binary plan (retention 30d). If something goes
      # wrong post-apply, this is the evidence of what was promised.
      - name: Archive plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: tfplan-${{ github.sha }}
          path: deploy/terraform/tfplan.bin
          retention-days: 30

      # Apply the exact plan we just computed. No -auto-approve needed
      # (and not accepted): a saved plan file is itself the approval.
      - name: terraform apply (saved plan)
        id: apply
        run: |
          set -o pipefail
          terraform apply -input=false -no-color tfplan.bin 2>&1 | tee apply.txt

      # Append a summary visible on the workflow run page. Shows the
      # plan (what was about to happen) and the apply (what actually
      # happened). On failure, comparing the two pinpoints whether the
      # apply diverged from the plan or failed for another reason.
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Terraform Apply"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Plan:**   ${{ steps.plan.outcome }}"
            echo "**Apply:**  ${{ steps.apply.outcome }}"
            echo ""
            echo "<details><summary>Plan output</summary>"
            echo ""
            echo '```hcl'
            head -c 30000 plan.txt 2>/dev/null || echo "(no plan output)"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "<details><summary>Apply output</summary>"
            echo ""
            echo '```hcl'
            head -c 30000 apply.txt 2>/dev/null || echo "(no apply output)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
