# Terraform Plan on PR.
#
# Triggered on any PR that touches deploy/terraform/** or this workflow.
# Runs fmt-check / init / validate / tflint / trivy / plan, and posts
# the plan output as a PR comment.
#
# Auth: zero long-lived secrets in GitHub.
#   - AWS (state bucket + lock table): OIDC -> arn:aws:iam::386324384913:role/gemline-tf-plan
#   - Infisical (HCLOUD_TOKEN, CLOUDFLARE_API_TOKEN, ...): OIDC -> machine identity
#
# The role is least-privilege: it can only read the state object and
# CRUD the lock item. No write to state, no other AWS service access.

name: Terraform Plan

on:
  pull_request:
    paths:
      - 'deploy/terraform/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read         # checkout
  id-token: write        # request OIDC JWT from GitHub
  pull-requests: write   # post plan comment

concurrency:
  # One plan at a time per PR. A new push cancels the in-flight one to
  # avoid racing for the DynamoDB lock.
  group: terraform-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      # SHA-pinned actions: protects against supply chain attacks (a
      # compromised maintainer can't backdoor us via a tag move). To
      # bump: find the new SHA with `gh api repos/<org>/<repo>/commits/<ref>`
      # and update both the SHA and the trailing version comment.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (2026)

      # AWS OIDC: exchange GitHub-signed JWT for short-lived STS creds.
      # The IAM role's trust policy verifies repo + branch/PR + audience.
      - name: AWS OIDC auth
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::386324384913:role/gemline-tf-plan
          aws-region: eu-west-3

      # Infisical OIDC: same pattern, different provider.
      # Exposes every secret in env=prod as env vars on the runner.
      - name: Infisical OIDC + fetch secrets
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995  # v1.0.16
        with:
          method: oidc
          # EU region - project lives on eu.infisical.com, not global
          # app.infisical.com. Wrong region returns 404.
          domain: https://eu.infisical.com
          identity-id: 09158407-59f2-474f-b5b4-0b5e1d6febb2
          # Audience must match Infisical's Bound Audiences exactly.
          # We use the identity ID as a unique, meaningful audience.
          oidc-audience: 09158407-59f2-474f-b5b4-0b5e1d6febb2
          project-slug: gemline
          env-slug: prod
          secret-path: /

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: 1.14.5

      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6  # v4
        with:
          tflint_version: v0.62.1

      # Static checks first — fail fast before touching state.
      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      # -lockfile=readonly ensures the .terraform.lock.hcl is honored
      # exactly as committed, no silent upgrades in CI.
      - name: terraform init
        run: terraform init -input=false -lockfile=readonly

      - name: terraform validate
        run: terraform validate

      - name: tflint
        run: |
          tflint --init
          tflint -f compact

      # Trivy scans the Terraform code itself for insecure declarations
      # (open security groups, unencrypted storage, etc.). Severity
      # HIGH/CRITICAL fails the job — anything else is informational.
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: config
          scan-ref: deploy/terraform
          severity: HIGH,CRITICAL
          exit-code: '1'

      # The actual plan. TF_VAR_* env vars are picked up by Terraform as
      # input variables. The Infisical secrets are already on the
      # runner's env from the auth step above; we just rename them with
      # the TF_VAR_ prefix.
      - name: terraform plan
        id: plan
        env:
          TF_VAR_hcloud_token: ${{ env.HCLOUD_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ env.CLOUDFLARE_API_TOKEN }}
          # List-typed var: TF parses JSON when value starts with [ or {.
          # Infisical stores it as `["x.y.z.t/32", ...]`.
          TF_VAR_kubeapi_allowed_ips: ${{ env.KUBEAPI_ALLOWED_IPS }}
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -out=tfplan.bin 2>&1 | tee plan.txt
        continue-on-error: true

      # Always post the plan, even on failure, so the PR author can see
      # what went wrong without diving into Actions logs.
      - name: Post plan to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const fs = require('fs');
            let plan = '';
            try {
              plan = fs.readFileSync('deploy/terraform/plan.txt', 'utf8');
            } catch (e) {
              plan = '(plan output unavailable - see workflow logs)';
            }
            // GitHub comment hard limit is ~65535 chars.
            const max = 60000;
            if (plan.length > max) {
              plan = plan.substring(0, max) + '\n\n... (truncated, see workflow logs for full output)';
            }
            const outcome = '${{ steps.plan.outcome }}';
            const status = outcome === 'success' ? 'OK' : 'FAILED';
            const body = [
              `### Terraform Plan: ${status}`,
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # Re-fail the job if the plan step failed (continue-on-error masked it).
      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
