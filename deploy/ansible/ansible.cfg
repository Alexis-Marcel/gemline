# Ansible config local au projet. Avec ce fichier au pwd, `ansible-playbook`
# lit automatiquement ces réglages sans qu'on ait à les retaper en flags.

[defaults]
# Où trouver l'inventaire par défaut. Évite de passer -i ... à chaque
# commande. Le `.py` est un script exécutable qui génère l'inventaire
# à partir de `terraform output -json` (voir inventory.tf.py).
# inventory.yaml est gardé comme référence/doc mais n'est plus utilisé.
inventory = inventory.tf.py

# Désactive l'avertissement "host_key_checking" parce que les IPs Hetzner
# tournent à chaque destroy/apply. On accepte automatiquement la nouvelle
# clé. ⚠️  Pas sécurisé pour de la vraie prod (MITM possible) — pour de
# l'apprentissage solo c'est OK. Pour prod : utiliser un known_hosts géré.
host_key_checking = False

# Affichage humain plutôt que JSON compact pour les outputs longs.
# Depuis ansible-core 2.13, on utilise le callback `default` natif avec
# l'option `result_format=yaml` (l'ancien callback `community.general.yaml`
# a été supprimé dans community.general 12.0.0).
stdout_callback = default
result_format = yaml
bin_ansible_callbacks = True

# Forks: combien d'hôtes traités en parallèle. Avec 2 nodes c'est large.
forks = 10

# Limite les warnings non actionnables ("could not match supplied host pattern").
deprecation_warnings = False

[ssh_connection]
# Multiplexage SSH: réutilise la même connexion pour plusieurs tâches sur
# le même host. Énorme gain de vitesse (3-5x sur un playbook moyen).
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
