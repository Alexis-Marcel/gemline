# Same k3s version on CP and workers or node registration fails.
k3s_channel: "stable"   # or pin: k3s_version: "v1.35.4+k3s1"

# Indirection to vault.yaml keeps the real token out of git.
k3s_token: "{{ vault_k3s_token }}"

cert_manager_version: "v1.16.1"
cert_manager_manifest_url: "https://github.com/cert-manager/cert-manager/releases/download/{{ cert_manager_version }}/cert-manager.yaml"

argocd_version: "v3.4.1"
argocd_install_manifest: "https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml"

# ArgoCD Applications pulled from git so they stay in sync with what's committed.
argocd_apps_repo_raw: "https://raw.githubusercontent.com/Alexis-Marcel/gemline/main/deploy/argocd"
argocd_apps:
  - app-sealed-secrets.yaml
  - app-external-secrets.yaml
  - app-eso-config.yaml
  - app-monitoring.yaml
  - app-gemline.yaml
