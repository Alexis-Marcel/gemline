# Inventaire statique. Format YAML (l'autre format possible est INI,
# c'est ce que tu vois dans la plupart des tuto, mais YAML scale mieux
# avec des variables par host).
#
# ⚠️  Les IPs ci-dessous changent à chaque `terraform destroy + apply`
# (Hetzner pioche dans son pool). Update à la main pour l'instant —
# Phase 1.5 : remplacer par un inventaire DYNAMIQUE qui lit `terraform
# output -json` automatiquement. C'est ce que tu mettras en CI.
#
# Récupère les IPs courantes avec :
#   cd deploy/terraform
#   terraform output control_plane_ipv4
#   terraform output worker_ipv4

all:
  # Vars communes à TOUS les hôtes (CP + workers)
  vars:
    # Hetzner private network — utilisé par les rôles k3s pour configurer
    # --node-ip / --advertise-address. Match ce qui est dans
    # deploy/terraform/main.tf (10.0.0.0/16, subnet 10.0.1.0/24).
    private_network_cidr: "10.0.0.0/16"
    private_network_gateway: "10.0.0.1"
    private_iface: "enp7s0"
    # SSH user — Hetzner Ubuntu images by default use root with key auth.
    ansible_user: root
    # Force Python 3 (Ubuntu 24.04 default). Sans ça, Ansible tente
    # `/usr/bin/python` qui n'existe pas → bail au premier task.
    ansible_python_interpreter: /usr/bin/python3

  children:
    # Groupe "control_plane" — pour cibler avec `--limit control_plane`
    # ou dans les playbooks via `hosts: control_plane`.
    control_plane:
      hosts:
        gemline-cp:
          # IP publique pour SSH
          ansible_host: 178.105.96.133
          # IP privée pour les configs k3s
          private_ip: 10.0.1.10

    workers:
      hosts:
        gemline-w1:
          ansible_host: 178.105.115.18
          private_ip: 10.0.1.11

    # Groupe "k3s_cluster" = union de CP + workers. Pratique pour les
    # tâches qui s'appliquent à tous les nodes (config réseau, sysctls…).
    k3s_cluster:
      children:
        control_plane:
        workers:
