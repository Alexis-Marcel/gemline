---
- name: Bootstrap network on all k3s nodes
  hosts: k3s_cluster
  gather_facts: false
  roles:
    - role: networking
      tags: [networking]

- name: Install k3s server on control plane
  hosts: control_plane
  gather_facts: false
  # serial: 1 lets the first CP finish --cluster-init before cp2/cp3 run
  # --server; otherwise the HA joins race the etcd bootstrap and fail.
  serial: 1
  roles:
    - role: k3s_server
      tags: [k3s, k3s_server]

- name: Install k3s agents on workers
  hosts: workers
  gather_facts: false
  roles:
    - role: k3s_agent
      tags: [k3s, k3s_agent]

# Add-ons are cluster-scoped K8s objects; pin to the first CP so they're
# applied once instead of racing from every CP.
- name: Install cluster add-ons (run once, from first CP)
  hosts: control_plane[0]
  gather_facts: false
  roles:
    - role: cert_manager
      tags: [cert_manager, addons]
    - role: argocd
      tags: [argocd, addons]
    - role: argocd_apps
      tags: [argocd_apps, addons]
