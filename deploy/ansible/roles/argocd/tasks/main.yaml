---
# Installs ArgoCD from the official manifest and waits for it to be up.
# The Applications themselves are applied by the argocd_apps role.

- name: Ensure argocd namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: argocd
    kubeconfig: /etc/rancher/k3s/k3s.yaml

- name: Download ArgoCD install manifest
  ansible.builtin.get_url:
    url: "{{ argocd_install_manifest }}"
    dest: /tmp/argocd-install.yaml
    mode: '0644'

# server_side_apply + force_conflicts: same field-ownership transition as
# cert-manager. namespace: argocd scopes the unscoped resources in the YAML.
- name: Apply ArgoCD resources
  kubernetes.core.k8s:
    state: present
    src: /tmp/argocd-install.yaml
    namespace: argocd
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    apply: true
    server_side_apply:
      field_manager: ansible-bootstrap
      force_conflicts: true

- name: Wait for ArgoCD deployments to be Available
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: argocd
    name: "{{ item }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  loop:
    - argocd-server
    - argocd-repo-server
    - argocd-applicationset-controller
    - argocd-notifications-controller

# Wait on the pod (which has a Ready condition), not the StatefulSet (which doesn't).
- name: Wait for ArgoCD application-controller pod to be Ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: argocd
    label_selectors:
      - "app.kubernetes.io/name=argocd-application-controller"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 300
