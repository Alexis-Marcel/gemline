---
# Applies the ArgoCD Applications listed in group_vars/all/vars.yaml.
# Once they're in the cluster, ArgoCD takes over and syncs from git.

- name: Download ArgoCD Application manifests
  ansible.builtin.get_url:
    url: "{{ argocd_apps_repo_raw }}/{{ item }}"
    dest: "/tmp/{{ item }}"
    mode: '0644'
  loop: "{{ argocd_apps }}"

# server_side_apply + force_conflicts: same field-ownership transition as cert-manager.
- name: Apply ArgoCD Applications
  kubernetes.core.k8s:
    state: present
    src: "/tmp/{{ item }}"
    namespace: argocd
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    apply: true
    server_side_apply:
      field_manager: ansible-bootstrap
      force_conflicts: true
  loop: "{{ argocd_apps }}"
