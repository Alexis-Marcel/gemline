---
# Installs cert-manager via kubernetes.core modules. kubernetes_python_deps
# runs first (declared in meta/main.yaml).

# k8s module takes a local src:, not a URL, so download first.
- name: Download cert-manager manifest
  ansible.builtin.get_url:
    url: "{{ cert_manager_manifest_url }}"
    dest: /tmp/cert-manager.yaml
    mode: '0644'

# server_side_apply + force_conflicts to take ownership of fields the
# original cloud-init install stamped as kubectl-client-side-apply,
# avoiding 409 FieldManagerConflict.
- name: Apply cert-manager resources
  kubernetes.core.k8s:
    state: present
    src: /tmp/cert-manager.yaml
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    apply: true
    server_side_apply:
      field_manager: ansible-bootstrap
      force_conflicts: true

- name: Wait for cert-manager deployments to be Available
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: cert-manager
    name: "{{ item }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 480   # generous for a cx23 cold boot
  loop:
    - cert-manager
    - cert-manager-webhook
    - cert-manager-cainjector
