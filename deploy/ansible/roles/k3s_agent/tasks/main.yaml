---
# Rôle "k3s_agent" — installe k3s en mode "agent" (worker) sur les
# nodes workers. Joint le cluster via l'IP privée du CP + le k3s_token
# partagé. Idempotent : skip si k3s déjà installé.
#
# Variables attendues :
#   - private_ip          : IP privée DU WORKER (10.0.1.11, 10.0.1.12, …)
#   - private_iface       : nom de l'interface privée (enp7s0)
#   - k3s_channel         : "stable", "latest" ou version pinnée
#   - k3s_token           : token du cluster (depuis vault)
#   - groups['control_plane'][0] : nom d'inventaire du CP, pour récupérer
#                                  son IP privée via hostvars

# Précondition n°1 : token disponible.
- name: Ensure k3s_token is provided
  ansible.builtin.assert:
    that:
      - k3s_token is defined
      - k3s_token | length > 0
    fail_msg: "k3s_token missing — provide via Ansible Vault"

# Précondition n°2 : connaître l'IP du CP pour s'y connecter.
# `hostvars` est un dict des variables de TOUS les hôtes de l'inventaire.
# `groups.control_plane[0]` = le 1er host du groupe "control_plane"
# (gemline-cp). On récupère son `private_ip` depuis l'inventory.
- name: Resolve control-plane private IP
  ansible.builtin.set_fact:
    cp_private_ip: "{{ hostvars[groups['control_plane'][0]]['private_ip'] }}"

- name: Ensure CP private IP was resolved
  ansible.builtin.assert:
    that:
      - cp_private_ip is defined
      - cp_private_ip | length > 0
    fail_msg: "Could not resolve control_plane private_ip from inventory"

# Idempotence : skip l'install si k3s déjà là.
- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install k3s agent (joins control plane at {{ cp_private_ip }})
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_CHANNEL={{ k3s_channel }} \
      INSTALL_K3S_EXEC="agent --node-ip={{ private_ip }} \
                              --flannel-iface={{ private_iface }}" \
      K3S_URL="https://{{ cp_private_ip }}:6443" \
      K3S_TOKEN="{{ k3s_token }}" \
      sh -
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists
  no_log: true

# Vérification : `kubectl wait` est l'outil dédié — il poll lui-même
# l'API et exit 0 dès que le node est Ready, ou 1 au timeout. Plus
# propre que de faire la boucle nous-mêmes avec until/retries.
#
# delegate_to: on exécute la commande depuis le CP (qui a kubectl
# configuré), pas depuis le worker. Pattern essentiel d'Ansible : la
# task itère sur les workers mais on délègue la vérification au CP.
- name: Wait for this node to be Ready in the cluster
  ansible.builtin.command: >
    /usr/local/bin/kubectl wait
    --for=condition=Ready
    node/{{ inventory_hostname }}
    --timeout=150s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  delegate_to: "{{ groups['control_plane'][0] }}"
  changed_when: false
