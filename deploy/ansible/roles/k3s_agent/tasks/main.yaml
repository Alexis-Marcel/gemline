---
# Installs k3s agent on workers. They join via the LB (not a specific CP
# IP) so a worker survives the loss of any single CP.

- name: Ensure k3s_token is provided
  ansible.builtin.assert:
    that:
      - k3s_token is defined
      - k3s_token | length > 0
    fail_msg: "k3s_token missing - provide via Ansible Vault"

- name: Ensure lb_ipv4 is provided
  ansible.builtin.assert:
    that:
      - lb_ipv4 is defined
      - lb_ipv4 | length > 0
    fail_msg: "lb_ipv4 missing from inventory - Hetzner LB not provisioned?"

# Idempotence: skip install if k3s already present.
- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install k3s agent (joins via LB at {{ lb_ipv4 }})
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_CHANNEL={{ k3s_channel }} \
      INSTALL_K3S_EXEC="agent --node-ip={{ private_ip }} \
                              --flannel-iface={{ private_iface }}" \
      K3S_URL="https://{{ lb_ipv4 }}:6443" \
      K3S_TOKEN="{{ k3s_token }}" \
      sh -
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists
  no_log: true

# Delegated to the first CP, which has kubectl and a valid kubeconfig.
- name: Wait for this node to be Ready in the cluster
  ansible.builtin.command: >
    /usr/local/bin/kubectl wait
    --for=condition=Ready
    node/{{ inventory_hostname }}
    --timeout=150s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  delegate_to: "{{ groups['control_plane'][0] }}"
  changed_when: false
