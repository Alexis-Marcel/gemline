---
# Installs k3s server on every control_plane node. The first CP runs
# --cluster-init to bootstrap embedded etcd; the rest join via the LB
# with --server. All add --tls-san {{ lb_ipv4 }} so the API cert is valid
# when clients connect through the LB. Requires serial: 1 (see playbook).

- name: Ensure k3s_token is provided
  ansible.builtin.assert:
    that:
      - k3s_token is defined
      - k3s_token | length > 0
    fail_msg: >
      k3s_token is missing. Provide it via Ansible Vault (see
      group_vars/all/vault.yaml) and run with --ask-vault-pass.

- name: Ensure lb_ipv4 is provided
  ansible.builtin.assert:
    that:
      - lb_ipv4 is defined
      - lb_ipv4 | length > 0
    fail_msg: >
      lb_ipv4 missing from inventory. Check that the Hetzner Load
      Balancer exists (terraform apply) and that inventory.tf.py
      reads load_balancer_ipv4 from terraform output.

# Idempotence: skip install if k3s already present.
- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Determine cluster-init role
  ansible.builtin.set_fact:
    is_first_cp: "{{ inventory_hostname == groups['control_plane'][0] }}"

- name: Build TLS SAN list
  ansible.builtin.set_fact:
    tls_sans:
      - "{{ ansible_host }}"   # this node's public IP
      - "{{ lb_ipv4 }}"        # the Load Balancer's public IP

- name: Install k3s server (FIRST CP - cluster init)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_CHANNEL={{ k3s_channel }} \
      INSTALL_K3S_EXEC="server \
                        --cluster-init \
                        --node-ip={{ private_ip }} \
                        --advertise-address={{ private_ip }} \
                        --flannel-iface={{ private_iface }} \
                        {% for san in tls_sans %}--tls-san={{ san }} {% endfor %}" \
      K3S_TOKEN="{{ k3s_token }}" \
      sh -
  args:
    creates: /usr/local/bin/k3s
  when:
    - not k3s_binary.stat.exists
    - is_first_cp
  no_log: true

- name: Install k3s server (ADDITIONAL CP - join via LB)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_CHANNEL={{ k3s_channel }} \
      INSTALL_K3S_EXEC="server \
                        --server=https://{{ lb_ipv4 }}:6443 \
                        --node-ip={{ private_ip }} \
                        --advertise-address={{ private_ip }} \
                        --flannel-iface={{ private_iface }} \
                        {% for san in tls_sans %}--tls-san={{ san }} {% endfor %}" \
      K3S_TOKEN="{{ k3s_token }}" \
      sh -
  args:
    creates: /usr/local/bin/k3s
  when:
    - not k3s_binary.stat.exists
    - not is_first_cp
  # no_log hides K3S_TOKEN; flip to false temporarily to debug a failed join.
  no_log: true

- name: Wait for k3s API to be reachable on this node
  ansible.builtin.command: /usr/local/bin/kubectl get nodes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: nodes_check
  until: nodes_check.rc == 0
  retries: 30
  delay: 5
  changed_when: false
