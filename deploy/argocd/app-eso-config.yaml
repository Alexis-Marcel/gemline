# ArgoCD Application for ESO configuration (cross-namespace).
#
# Separate from `app-gemline` because it carries resources in multiple
# namespaces and cluster-scoped objects (the gemline app kustomize
# forces namespace=gemline on everything).
#
# What lives here:
#   - SealedSecret with Infisical machine-identity creds (in
#     external-secrets namespace) — the only Sealed Secret we keep,
#     used as bootstrap auth for ESO.
#   - ClusterSecretStore pointing at Infisical (added later).
#   - ExternalSecret resources for each consuming app (added later).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Alexis-Marcel/gemline.git
    targetRevision: main
    path: deploy/k8s/external-secrets

  destination:
    server: https://kubernetes.default.svc
    # Default namespace for resources without one in their manifest.
    # Cluster-scoped objects (ClusterSecretStore) ignore this.
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
