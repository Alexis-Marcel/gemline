# ESO config app, separate from app-gemline because its resources span
# multiple namespaces and include cluster-scoped objects (the gemline
# kustomize forces namespace=gemline on everything).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Alexis-Marcel/gemline.git
    targetRevision: main
    path: deploy/k8s/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
