# External Secrets Operator (ESO) — pull secrets from external vaults
# (Infisical, Vault HC, AWS SM, …) and materialise them as native K8s
# Secrets. Project CNCF Incubating, de-facto standard for the pattern.
#
# Pattern downstream :
#   - We declare a ClusterSecretStore that points at Infisical (auth via
#     the SealedSecret in deploy/k8s/sealed-infisical-auth.yaml).
#   - Per-namespace ExternalSecret resources pull specific secrets from
#     Infisical → K8s Secret → consumed by pods (envFrom, volume…).
#
# Lives in its own namespace `external-secrets` (chart convention).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    # Bump as needed — chart releases follow operator versions at
    # https://github.com/external-secrets/external-secrets/releases
    targetRevision: 0.11.0
    helm:
      releaseName: external-secrets
      values: |
        # CRDs are installed by the chart (ExternalSecret, SecretStore,
        # ClusterSecretStore, …). Required for ESO to function at all.
        installCRDs: true

        # Single-replica everywhere — fits a solo cx23 cluster, bump
        # when you actually need HA (mostly relevant in multi-AZ prod).
        replicaCount: 1
        webhook:
          replicaCount: 1
        certController:
          replicaCount: 1

        # Conservative limits — ESO is light, mostly idle except during
        # secret refresh cycles.
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      # CRDs need a beat to register before the operator picks them up.
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
