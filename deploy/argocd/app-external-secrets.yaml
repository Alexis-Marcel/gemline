# External Secrets Operator: pulls secrets from Infisical and materializes
# them as native K8s Secrets via ClusterSecretStore + ExternalSecret.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.11.0
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true

        replicaCount: 1
        webhook:
          replicaCount: 1
        certController:
          replicaCount: 1

        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      # CRDs need a beat to register before the operator picks them up.
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
