# External Secrets Operator: pulls secrets from AWS Secrets Manager and
# materializes them as native K8s Secrets via ClusterSecretStore + ExternalSecret.
# Auth is IRSA-equivalent — the controller's ServiceAccount carries the
# eks.amazonaws.com/role-arn annotation (set in the Helm values below), and
# ESO exchanges its projected SA token for AWS credentials via AWS STS.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.11.0
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true

        replicaCount: 1
        webhook:
          replicaCount: 1
        certController:
          replicaCount: 1

        # IRSA annotation on the controller's SA. ESO's AWS provider reads it
        # via the EKS pod identity webhook chain (also works on k3s thanks to
        # the OIDC issuer we publish to S3). Don't also set provider.aws.role
        # in the ClusterSecretStore — that would chain two AssumeRole calls
        # and the second fails (role doesn't trust itself).
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::386324384913:role/gemline-eso-secrets-reader

        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      # CRDs need a beat to register before the operator picks them up.
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
