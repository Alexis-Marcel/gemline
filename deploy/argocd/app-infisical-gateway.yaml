# ArgoCD Application — Infisical Gateway via la chart Helm officielle.
#
# Le Gateway établit un tunnel outbound vers Infisical SaaS (région EU),
# permettant à Infisical de faire du Kubernetes Auth contre l'API K8s
# privée de ce cluster sans qu'on ouvre le firewall.
#
# Le token Gateway vient d'un SealedSecret existant
# (deploy/k8s/external-secrets/sealed-infisical-gateway-token.yaml)
# avec la clé `token` — la chart accepte un existingSecretRef pour
# éviter de stocker le token en clair dans values.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical-gateway
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
    chart: infisical-gateway
    # Bump as needed. Chart version != image version (image = infisical/cli).
    targetRevision: "*"
    helm:
      releaseName: infisical-gateway
      # Configuration MINIMALE : on s'aligne sur les défauts de la
      # chart au lieu de les override. La chart attend par défaut un
      # Secret nommé `infisical-gateway-environment` avec la clé
      # `enrollment-token` — c'est ce qu'on a généré côté SealedSecret.
      # Le `gateway.domain` reste configurable (EU region chez nous).
      values: |
        gateway:
          domain: https://eu.infisical.com
        persistence:
          enabled: true
          size: 1Gi
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
