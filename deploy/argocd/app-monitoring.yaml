# kube-prometheus-stack. Sync this before app-gemline so the ServiceMonitor
# CRD exists when the gemline ServiceMonitor is applied.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 75.6.0
    helm:
      releaseName: kube-prometheus-stack
      values: |
        prometheus:
          prometheusSpec:
            # Discover ServiceMonitors/PodMonitors/Rules in any namespace,
            # not just those carrying the chart's release label.
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            scrapeConfigSelectorNilUsesHelmValues: false
            retention: 15d
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            # Persist so a restart doesn't wipe the retained metrics.
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
        grafana:
          # admin creds come from the grafana-admin Secret (ESO/Infisical).
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          defaultDashboardsEnabled: true
          persistence:
            enabled: true
            size: 2Gi
          sidecar:
            dashboards:
              enabled: true
            datasources:
              enabled: true
        alertmanager:
          enabled: true
          alertmanagerSpec:
            resources:
              requests:
                cpu: 10m
                memory: 32Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ServerSideApply: the chart's large CRDs exceed the 256KB
      # client-side-apply annotation limit.
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      # CRDs take a few seconds to register before their CRs apply cleanly.
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
