# Sealed Secrets controller (Bitnami). Lives in kube-system because the
# decryption key Secret it generates (sealed-secrets-key) is cluster-
# scoped and conventionally co-located with the controller.
#
# Workflow:
#   1. This Application installs the controller. It generates a private
#      key in kube-system on first start.
#   2. From your laptop, fetch the matching public cert:
#        kubeseal --controller-namespace kube-system --fetch-cert > pub.pem
#   3. Encrypt your secret with kubeseal (see deploy/k8s/secret.example.yaml)
#      and commit the resulting SealedSecret. ArgoCD applies it, the
#      controller decrypts it into a real Secret.
#
# CRITICAL: the master key (Secret sealed-secrets-key in kube-system) is
# the only thing that can decrypt your SealedSecrets. Back it up before
# tearing down the cluster, or your committed SealedSecrets become
# unreadable on the rebuild. See secret.example.yaml for the backup
# one-liner.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    # Bump as needed — chart releases at
    # https://github.com/bitnami-labs/sealed-secrets/releases
    targetRevision: 2.16.2
    helm:
      releaseName: sealed-secrets
      values: |
        # Install in kube-system (the project's default and what kubeseal
        # CLI expects). The fullnameOverride keeps resource names short
        # and stable across chart upgrades — kubeseal looks for a
        # Service named `sealed-secrets` by convention.
        fullnameOverride: sealed-secrets
        namespace: kube-system
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
