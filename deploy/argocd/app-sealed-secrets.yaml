# Sealed Secrets controller (Bitnami), in kube-system per convention.
#
# CRITICAL: the master key (Secret sealed-secrets-key in kube-system) is
# the only thing that can decrypt committed SealedSecrets. Back it up
# before tearing down the cluster (see secret.example.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.16.2
    helm:
      releaseName: sealed-secrets
      values: |
        # kubeseal looks for a Service named `sealed-secrets` in kube-system.
        fullnameOverride: sealed-secrets
        namespace: kube-system
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
