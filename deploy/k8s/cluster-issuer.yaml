# cert-manager ClusterIssuer for Let's Encrypt production. Applied
# automatically by ArgoCD via the gemline kustomization. The email
# below is the contact LE pings before a cert expires — not a secret,
# safe to commit.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: alexismarcel55@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
