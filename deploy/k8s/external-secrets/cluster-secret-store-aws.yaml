# IRSA-equivalent: ESO presents its ServiceAccount JWT (audience=sts.amazonaws.com),
# AWS STS validates it against the cluster's OIDC discovery in S3, and returns
# short-lived credentials for the gemline-eso-secrets-reader role. No long-lived
# AWS keys live in the cluster.
#
# The role ARN comes from the eks.amazonaws.com/role-arn annotation on the
# `external-secrets` ServiceAccount (set via the chart's serviceAccount.annotations
# values). Don't repeat it as `provider.aws.role:` here — ESO would then chain
# two AssumeRole calls and the second one fails (the role doesn't trust itself).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-3
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
