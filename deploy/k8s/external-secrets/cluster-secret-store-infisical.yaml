# ClusterSecretStore — déclare "comment ESO se logge à Infisical".
#
# Cluster-scoped (pas SecretStore qui est namespaced) pour qu'un seul
# objet puisse servir tous les namespaces (gemline, monitoring, etc.).
# Les ExternalSecret référencent ce store par son `name`.
#
# Auth via Universal Auth (clientId + clientSecret stockés dans le
# Secret K8s `infisical-auth` du namespace `external-secrets`, créé
# par sealed-secrets à partir de sealed-infisical-auth.yaml).

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical-prod
spec:
  provider:
    infisical:
      # API publique d'Infisical Cloud. Si tu self-host un jour :
      # remplacer par l'URL de ton instance.
      hostAPI: https://app.infisical.com/api
      auth:
        universalAuthCredentials:
          # Pour un ClusterSecretStore, on DOIT préciser le namespace
          # du Secret référencé (sinon ESO ne saurait pas où chercher,
          # contrairement à un SecretStore namespaced).
          clientId:
            name: infisical-auth
            key: clientId
            namespace: external-secrets
          clientSecret:
            name: infisical-auth
            key: clientSecret
            namespace: external-secrets
      secretsScope:
        # ⚠️  À VÉRIFIER dans Infisical UI :
        # Project Settings → General → "Project Slug"
        projectSlug: gemline
        # ⚠️  À VÉRIFIER : Project Settings → Environments → colonne "Slug"
        # pour l'environnement "Production".
        environmentSlug: prod
        # Les secrets sont à la racine du folder de l'environnement —
        # pas dans un sous-dossier. Si tu organises en folders un jour,
        # change ici (ex: "/database", "/api-keys").
        secretsPath: "/"
        recursive: false
