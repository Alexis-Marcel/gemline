# Cluster-scoped store so one object serves every namespace. Auth via
# Universal Auth, credentials in the infisical-auth Secret (created by
# sealed-secrets).

apiVersion: external-secrets.io/v1beta1  # pinned ESO chart 0.11.0 only serves v1beta1; bump to 0.14+ for v1
kind: ClusterSecretStore
metadata:
  name: infisical-prod
spec:
  provider:
    infisical:
      # Region-specific URL (not app.infisical.com): CI's OIDC auth 404s
      # on the global edge, so use eu.infisical.com everywhere for parity.
      hostAPI: https://eu.infisical.com/api
      auth:
        universalAuthCredentials:
          # A ClusterSecretStore must name the Secret's namespace explicitly.
          clientId:
            name: infisical-auth
            key: clientId
            namespace: external-secrets
          clientSecret:
            name: infisical-auth
            key: clientSecret
            namespace: external-secrets
      secretsScope:
        # Must match Infisical's Project Slug and environment Slug.
        projectSlug: gemline
        environmentSlug: prod
        secretsPath: "/"
        recursive: false
