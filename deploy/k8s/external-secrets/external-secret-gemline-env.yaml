# ExternalSecret — fait apparaître un Secret K8s natif `gemline-env`
# dans le namespace `gemline`, populé depuis Infisical via le store
# `infisical-prod`.
#
# Pattern : déclaratif côté git, pull périodique vers Infisical, et le
# Secret K8s qui en résulte est consommé par gemline-server via
# `envFrom: secretRef`.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gemline-env
  namespace: gemline
spec:
  # ESO re-pull Infisical toutes les 1h. Si un secret est rotaté dans
  # Infisical, la propagation est sub-heure (1h max). Tu peux baisser
  # à 5m si tu veux des rotations quasi-instant — au prix de plus
  # d'appels API. 1h est un bon défaut.
  refreshInterval: 1h

  # Référence vers le ClusterSecretStore qui sait parler à Infisical.
  # Le store contient la config "comment se logger + à quel projet/env
  # taper".
  secretStoreRef:
    name: infisical-prod
    kind: ClusterSecretStore

  # Le Secret K8s qui sera créé/mis-à-jour par ESO.
  target:
    name: gemline-env
    # `Owner` = ESO crée le Secret avec un ownerReference sur cet
    # ExternalSecret. Conséquence : si tu supprimes l'ExternalSecret,
    # le Secret est supprimé aussi (garbage collection K8s natif).
    creationPolicy: Owner

  # Mapping explicite : pour chaque clé K8s qu'on veut, on dit où la
  # chercher dans Infisical. La convention "même nom des deux côtés"
  # est saine — le Pod va lire `DATABASE_URL`, Infisical contient
  # `DATABASE_URL`. Lisible, traçable.
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: DATABASE_URL
    - secretKey: SUPABASE_URL
      remoteRef:
        key: SUPABASE_URL
    - secretKey: ALLOWED_ORIGINS
      remoteRef:
        key: ALLOWED_ORIGINS
