# Projects the gemline-env Secret into the gemline namespace from
# Infisical; consumed by gemline-server via envFrom: secretRef.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gemline-env
  namespace: gemline
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: infisical-prod
    kind: ClusterSecretStore

  target:
    name: gemline-env
    # Owner: deleting this ExternalSecret garbage-collects the Secret too.
    creationPolicy: Owner

  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: DATABASE_URL
    - secretKey: SUPABASE_URL
      remoteRef:
        key: SUPABASE_URL
    - secretKey: ALLOWED_ORIGINS
      remoteRef:
        key: ALLOWED_ORIGINS
