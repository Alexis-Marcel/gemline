# Projects the gemline-env Secret into the gemline namespace from AWS
# Secrets Manager; consumed by gemline-server via envFrom: secretRef.
# dataFrom.extract flattens the JSON secret in AWS into individual K8s
# Secret keys (one per JSON field), so the AWS secret just stores
# {"DATABASE_URL":"...","SUPABASE_URL":"...","ALLOWED_ORIGINS":"..."}.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gemline-env
  namespace: gemline
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: gemline-env
    # Owner: deleting this ExternalSecret garbage-collects the Secret too.
    creationPolicy: Owner

  dataFrom:
    - extract:
        key: gemline/env
