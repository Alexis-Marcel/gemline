# Projects the grafana-admin Secret into the monitoring namespace from AWS
# Secrets Manager; kube-prometheus-stack reads it via grafana.admin.existingSecret.
# The AWS secret stores {"admin-user":"admin","admin-password":"..."}.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: grafana-admin
    creationPolicy: Owner

  dataFrom:
    - extract:
        key: gemline/grafana-admin
