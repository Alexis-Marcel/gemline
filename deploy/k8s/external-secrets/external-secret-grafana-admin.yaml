# Projects the grafana-admin Secret into the monitoring namespace from
# Infisical; kube-prometheus-stack reads it via grafana.admin.existingSecret.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: infisical-prod
    kind: ClusterSecretStore

  target:
    name: grafana-admin
    creationPolicy: Owner

    # admin-user is a literal; admin-password comes from Infisical via the
    # `data` block below ({{ .password }}).
    template:
      type: Opaque
      data:
        admin-user: "admin"
        admin-password: "{{ .password }}"

  data:
    - secretKey: password   # local name used in the template above
      remoteRef:
        key: GRAFANA_ADMIN_PASSWORD   # key in Infisical
