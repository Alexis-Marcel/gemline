# ExternalSecret — fait apparaître le Secret K8s `grafana-admin` dans
# le namespace `monitoring`, populé depuis Infisical.
#
# Le chart kube-prometheus-stack consomme ce Secret via la valeur Helm
# `grafana.admin.existingSecret` (voir deploy/argocd/app-monitoring.yaml).
# Le chart lit `admin-user` et `admin-password` pour bootstrap.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: infisical-prod
    kind: ClusterSecretStore

  target:
    name: grafana-admin
    creationPolicy: Owner

    # `template` combine literal + valeurs pull pour produire le Secret
    # final. C'est le pattern propre quand un consumer attend une
    # forme spécifique. Ici : admin-user est literal (pas un secret),
    # admin-password vient d'Infisical.
    #
    # Go templates : {{ .password }} référence la clé "password" du
    # bloc `data:` ci-dessous.
    template:
      type: Opaque
      data:
        admin-user: "admin"
        admin-password: "{{ .password }}"

  data:
    - secretKey: password   # nom local utilisé dans le template ci-dessus
      remoteRef:
        key: GRAFANA_ADMIN_PASSWORD   # clé dans Infisical
