# Projects the grafana-admin Secret into the monitoring namespace from AWS
# Secrets Manager; kube-prometheus-stack reads it via grafana.admin.existingSecret.
# The AWS secret stores {"admin-user":"admin","admin-password":"..."}.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: grafana-admin
    creationPolicy: Owner
    # Explicit default — the CRD webhook would inject it anyway and ArgoCD
    # would flag it as drift on every reconcile if we omit it here.
    deletionPolicy: Retain

  dataFrom:
    - extract:
        key: gemline/grafana-admin
        # Explicit defaults injected by the ESO webhook; written here so
        # ArgoCD doesn't see them as live-vs-git drift.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
