# Custom Deployment instead of the Helm chart: chart v1.0.5 doesn't wire
# the CLI args from values for enrollment.method=token. The Gateway opens
# an outbound tunnel to Infisical SaaS so K8s auth works without opening
# the firewall. Token read from a sealed-secrets-created Secret.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical-gateway
  namespace: external-secrets
  labels:
    app: infisical-gateway
spec:
  replicas: 1
  # Recreate, not rolling: only one Gateway at a time so the outbound tunnel resets cleanly.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: infisical-gateway
  template:
    metadata:
      labels:
        app: infisical-gateway
    spec:
      # fsGroup=1000 chowns the emptyDir so runAsUser=1000 can write its
      # $HOME/.infisical config dir.
      securityContext:
        fsGroup: 1000
      volumes:
        - name: home
          emptyDir: {}
      containers:
        - name: gateway
          image: infisical/cli:0.43.85
          imagePullPolicy: IfNotPresent
          env:
            # Points HOME at the writable emptyDir; otherwise the CLI tries
            # to write to the read-only / and bails.
            - name: HOME
              value: /home/infisical
            - name: ENROLLMENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: infisical-gateway-environment
                  key: enrollment-token
          volumeMounts:
            - name: home
              mountPath: /home/infisical
          command: ["infisical"]
          args:
            - "gateway"
            - "start"
            - "gemline-cluster"
            - "--enroll-method=token"
            - "--token=$(ENROLLMENT_TOKEN)"
            - "--domain=https://eu.infisical.com"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            # infisical/cli has no non-root USER, so set the UID explicitly
            # or runAsNonRoot can't be enforced.
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
