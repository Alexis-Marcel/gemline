# ESO config. Resources span multiple namespaces (and one cluster-scoped
# store), so this kustomization deliberately omits `namespace:` to keep
# each resource's own metadata namespace. Synced by app-eso-config.yaml.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cluster-secret-store-aws.yaml
  - external-secret-gemline-env.yaml
  - external-secret-grafana-admin.yaml
