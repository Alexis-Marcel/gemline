# Path-based routing on one hostname: /api, /ws, /healthz, /readyz -> server,
# everything else -> web. TLS provisioned by cert-manager via letsencrypt-prod.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gemline
  namespace: gemline
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - gemline.werilo.fr
      secretName: gemline-tls
  rules:
    - host: gemline.werilo.fr
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gemline-server
                port:
                  number: 80
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: gemline-server
                port:
                  number: 80
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: gemline-server
                port:
                  number: 80
          - path: /readyz
            pathType: Prefix
            backend:
              service:
                name: gemline-server
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gemline-web
                port:
                  number: 80
