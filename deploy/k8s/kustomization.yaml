# `kubectl apply -k deploy/k8s/` to deploy everything in one shot.
# The DSN + Supabase URL Secret is now pulled from Infisical via an
# ExternalSecret in deploy/k8s/external-secrets/ — not in this kustomize
# (lives in another namespace / ESO config bundle).

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gemline

# cluster-issuer.yaml is cluster-scoped — kustomize's `namespace:` above
# is a no-op for it. cert-manager picks it up by name when the ingress
# annotation `cert-manager.io/cluster-issuer: letsencrypt-prod` matches.
resources:
- namespace.yaml
- server-deployment.yaml
- server-service.yaml
- servicemonitor.yaml
- web-deployment.yaml
- web-service.yaml
- ingress.yaml
- cluster-issuer.yaml

# CI flips the `latest` tag to the commit SHA via `kustomize edit set image`
# before applying, so a rollback is just a re-apply with the previous tag.
images:
- name: ghcr.io/alexis-marcel/gemline-server
  newName: ghcr.io/alexis-marcel/gemline-server
  newTag: 713d06ebb5a982a3cd66390c5ee51575e867f52d
- name: ghcr.io/alexis-marcel/gemline-web
  newName: ghcr.io/alexis-marcel/gemline-web
  newTag: 713d06ebb5a982a3cd66390c5ee51575e867f52d
