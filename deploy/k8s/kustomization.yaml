# The app Secret is pulled from Infisical via an ExternalSecret in
# deploy/k8s/external-secrets/, so it's not part of this kustomize bundle.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gemline

# cluster-issuer.yaml is cluster-scoped, so the `namespace:` above is a no-op for it.
resources:
- namespace.yaml
- server-deployment.yaml
- server-service.yaml
- servicemonitor.yaml
- web-deployment.yaml
- web-service.yaml
- ingress.yaml
- cluster-issuer.yaml

# CI pins these tags to the commit SHA via `kustomize edit set image`.
images:
- name: ghcr.io/alexis-marcel/gemline-server
  newName: ghcr.io/alexis-marcel/gemline-server
  newTag: 9aa918ff5c62968a91c0ceb580765a86d985221c
- name: ghcr.io/alexis-marcel/gemline-web
  newName: ghcr.io/alexis-marcel/gemline-web
  newTag: 9aa918ff5c62968a91c0ceb580765a86d985221c
