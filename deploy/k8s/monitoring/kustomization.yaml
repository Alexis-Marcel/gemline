# Two kinds of monitoring config shipped from one kustomize layer:
#  - dashboards/*.json     → ConfigMaps labelled grafana_dashboard=1
#                            (Grafana sidecar auto-discovers and loads them)
#  - rules/*.yaml          → PrometheusRule resources synced as-is;
#                            kube-prometheus-stack's Prometheus picks them up
#                            because ruleSelectorNilUsesHelmValues=false.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

# disableNameSuffixHash keeps the ConfigMap name stable across edits — without
# it Kustomize appends a content hash and ArgoCD would prune-and-recreate on
# every dashboard change, briefly hiding the dashboard from Grafana.
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"

configMapGenerator:
  - name: dashboard-gemline-overview
    files:
      - dashboards/gemline-overview.json

resources:
  - rules/gemline.yaml
  - tempo-datasource.yaml
