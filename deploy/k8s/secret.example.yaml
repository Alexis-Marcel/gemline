# Template only — DO NOT commit a filled-in copy.
#
# Create the real secret out-of-band so values never land in git:
#
#   kubectl -n gemline create secret generic gemline-env \
#     --from-literal=DATABASE_URL='postgresql://postgres.<project>:<password>@aws-...pooler.supabase.com:5432/postgres' \
#     --from-literal=SUPABASE_URL='https://<project>.supabase.co'
#
# To update an existing secret:
#
#   kubectl -n gemline create secret generic gemline-env \
#     --from-literal=DATABASE_URL='...' \
#     --from-literal=SUPABASE_URL='...' \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: gemline-env
  namespace: gemline
type: Opaque
stringData:
  DATABASE_URL: "<set via kubectl, not in git>"
  SUPABASE_URL: "<set via kubectl, not in git>"
