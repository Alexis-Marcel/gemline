# Template for the gemline-env Secret via Sealed Secrets (Bitnami
# controller installed by deploy/argocd/app-sealed-secrets.yaml).
#
# Seal real values without writing plaintext to disk:
#   kubectl -n gemline create secret generic gemline-env \
#     --dry-run=client \
#     --from-literal=DATABASE_URL='postgresql://postgres.<proj>:<pwd>@aws-...pooler.supabase.com:5432/postgres' \
#     --from-literal=SUPABASE_URL='https://<proj>.supabase.co' \
#     --from-literal=ALLOWED_ORIGINS='https://gemline.werilo.fr' \
#     -o yaml \
#   | kubeseal --controller-namespace kube-system --controller-name sealed-secrets --format yaml \
#   > deploy/k8s/sealed-gemline-env.yaml
# Then add it to kustomization.yaml resources, commit, and push.
#
# CRITICAL: back up the master key after first bootstrap, or rebuilding
# the cluster makes every committed SealedSecret permanently unreadable:
#   kubectl -n kube-system get secret -l sealedsecrets.bitnami.com/sealed-secrets-key -o yaml > sealed-secrets-master-key.yaml
# Store it somewhere durable that ISN'T git. Restore before the controller
# generates a fresh key, then force a reload:
#   kubectl apply -f sealed-secrets-master-key.yaml
#   kubectl -n kube-system delete pod -l name=sealed-secrets
#
# Shape the Deployment expects:
apiVersion: v1
kind: Secret
metadata:
  name: gemline-env
  namespace: gemline
type: Opaque
stringData:
  DATABASE_URL: "<set via kubeseal, see above>"
  SUPABASE_URL: "<set via kubeseal, see above>"
  ALLOWED_ORIGINS: "<set via kubeseal, see above>"
