# Template + workflow for the gemline-env Secret.
#
# We use Sealed Secrets (Bitnami controller installed via
# deploy/argocd/app-sealed-secrets.yaml) so the encrypted manifest lives
# in git and ArgoCD applies it like any other resource. The controller
# decrypts it in-cluster into the real Secret the Deployment references.
#
# ---------------------------------------------------------------------
# ONE-TIME SETUP
# ---------------------------------------------------------------------
#
# 1. Install the kubeseal CLI locally:
#      brew install kubeseal
#
# 2. After the first `terraform apply`, wait for the sealed-secrets
#    controller to be ready (cloud-init applies it automatically):
#      kubectl -n kube-system rollout status deployment/sealed-secrets
#
# ---------------------------------------------------------------------
# GENERATING / UPDATING THE SECRET
# ---------------------------------------------------------------------
#
# 3. Encrypt your real values in a single pipe — the plaintext Secret
#    never lands on disk; kubeseal only sees the ephemeral stdin:
#
#      kubectl -n gemline create secret generic gemline-env \
#        --dry-run=client \
#        --from-literal=DATABASE_URL='postgresql://postgres.<proj>:<pwd>@aws-...pooler.supabase.com:5432/postgres' \
#        --from-literal=SUPABASE_URL='https://<proj>.supabase.co' \
#        --from-literal=ALLOWED_ORIGINS='https://gemline.werilo.fr' \
#        -o yaml \
#      | kubeseal \
#          --controller-namespace kube-system \
#          --controller-name sealed-secrets \
#          --format yaml \
#      > deploy/k8s/sealed-gemline-env.yaml
#
# 4. Uncomment the `- sealed-gemline-env.yaml` line in
#    deploy/k8s/kustomization.yaml.
#
# 5. Commit + push. ArgoCD applies the SealedSecret, the controller
#    decrypts it, the Deployment picks up the resulting Secret on its
#    next pod restart.
#
# ---------------------------------------------------------------------
# CRITICAL: BACK UP THE MASTER KEY
# ---------------------------------------------------------------------
#
# The decryption key lives in kube-system as a Secret labelled
# `sealedsecrets.bitnami.com/sealed-secrets-key`. Losing the cluster =
# losing the key = your committed SealedSecrets become permanently
# unreadable. Back it up once after the first bootstrap:
#
#   kubectl -n kube-system get secret \
#     -l sealedsecrets.bitnami.com/sealed-secrets-key \
#     -o yaml > sealed-secrets-master-key.yaml
#
# Store sealed-secrets-master-key.yaml in 1Password / a USB drive in a
# drawer / anywhere that survives the cluster but ISN'T git. To restore
# on a rebuilt cluster, BEFORE the controller generates a fresh key:
#
#   kubectl apply -f sealed-secrets-master-key.yaml
#   kubectl -n kube-system delete pod -l name=sealed-secrets   # force reload
#
# ---------------------------------------------------------------------
# FALLBACK: PLAIN SECRET (NOT RECOMMENDED)
# ---------------------------------------------------------------------
#
# If you really want to skip Sealed Secrets for a one-off test, you can
# still create the plain Secret out-of-band:
#
#   kubectl -n gemline create secret generic gemline-env \
#     --from-literal=DATABASE_URL='...' \
#     --from-literal=SUPABASE_URL='...' \
#     --from-literal=ALLOWED_ORIGINS='...'
#
# The shape the Deployment expects:
apiVersion: v1
kind: Secret
metadata:
  name: gemline-env
  namespace: gemline
type: Opaque
stringData:
  DATABASE_URL: "<set via kubeseal, see above>"
  SUPABASE_URL: "<set via kubeseal, see above>"
  ALLOWED_ORIGINS: "<set via kubeseal, see above>"
