apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemline-server
  namespace: gemline
  labels:
    app: gemline-server
spec:
  # Horizontally scalable: cross-pod event propagation and cache
  # invalidation go through the Postgres backplane (LISTEN/NOTIFY), and
  # matchmaking uses SKIP LOCKED so each pod matches independently.
  replicas: 2
  strategy:
    # maxUnavailable: 0 keeps >=2 healthy pods during a roll so HTTP sees
    # no gap and WS clients reconnect to the surviving pod.
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: gemline-server
  template:
    metadata:
      labels:
        app: gemline-server
    spec:
      # Headroom over the Go server's 10s graceful Shutdown plus the preStop sleep.
      terminationGracePeriodSeconds: 30
      # Spread replicas across nodes; ScheduleAnyway so a node drain doesn't block the roll.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gemline-server
      containers:
        - name: server
          image: ghcr.io/alexis-marcel/gemline-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: gemline-env
          env:
            - name: ADDR
              value: ":8080"
            # OTLP traces go to Alloy (cross-namespace, hence the FQDN). The
            # SDK appends /v1/traces. Empty endpoint = tracing disabled.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.monitoring.svc.cluster.local:4318"
            - name: OTEL_SERVICE_NAME
              value: "gemline-server"
            # Tag traces with the pod name + namespace so Tempo can group
            # spans per instance and Grafana's serviceMap works.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=gemline,k8s.pod.name=$(POD_NAME)"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          # preStop sleep lets Traefik's endpoint controller pull this pod
          # from the pool before the process stops accepting connections,
          # avoiding requests racing onto a dying pod.
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
