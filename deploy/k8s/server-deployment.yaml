apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemline-server
  namespace: gemline
  labels:
    app: gemline-server
spec:
  # Horizontally scalable: the in-process WebSocket hub fans events out
  # to local subscribers; cross-pod propagation goes through the
  # Postgres backplane (LISTEN/NOTIFY 'gemline_events'). The in-memory
  # GameRecord cache is invalidated cross-pod via the same channel, so
  # a write on one pod is visible to a read on another within ~10 ms.
  # The matchmaking queue table (matchmake_queue) and SKIP LOCKED let
  # every pod run its own matcher independently.
  replicas: 2
  strategy:
    # Bring the new pod up first, drain the old one through Traefik's
    # endpoint health-check, then terminate. With replicas=2 this never
    # drops below 2 healthy pods during a roll, so HTTP requests don't
    # see a gap and WS clients on the terminating pod reconnect to the
    # surviving one (their lastSeq + /events?since=N catches them up).
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: gemline-server
  template:
    metadata:
      labels:
        app: gemline-server
    spec:
      # 30 s gives in-flight HTTP requests a chance to finish before we
      # SIGKILL the container. The Go server's signal handler already
      # does a 10 s graceful Shutdown; the extra headroom is for the
      # kubelet/CNI to converge after the preStop sleep.
      terminationGracePeriodSeconds: 30
      # topologySpreadConstraints keeps the two replicas on different
      # nodes when possible, so losing a node doesn't take the whole
      # API down. ScheduleAnyway means a rollout that briefly spreads
      # 2/0 (e.g. during a node drain) still proceeds.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gemline-server
      containers:
        - name: server
          image: ghcr.io/alexis-marcel/gemline-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: gemline-env
          env:
            - name: ADDR
              value: ":8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          # preStop sleeps so Traefik's endpoint controller has time to
          # observe the SIGTERM-driven readiness change and pull this
          # pod out of the LB pool before the Go process actually stops
          # accepting connections. Without the sleep, in-flight HTTP
          # requests and WS upgrades that hit Traefik milliseconds
          # before the rotation can race and connect to a dying pod.
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
