apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemline-server
  namespace: gemline
  labels:
    app: gemline-server
spec:
  # The WebSocket hub is per-process — broadcasting to subscribers on
  # other replicas would need a pub/sub layer we haven't built yet. Keep
  # this at 1 until that exists.
  replicas: 1
  strategy:
    # Tear the old pod down before bringing the new one up: cheaper than
    # rolling and avoids two pods briefly fighting over the same in-memory
    # game cache.
    type: Recreate
  selector:
    matchLabels:
      app: gemline-server
  template:
    metadata:
      labels:
        app: gemline-server
    spec:
      containers:
        - name: server
          image: ghcr.io/alexis-marcel/gemline-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: gemline-env
          env:
            - name: ADDR
              value: ":8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
