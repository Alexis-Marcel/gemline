apiVersion: v1
kind: Service
metadata:
  name: gemline-server
  namespace: gemline
  labels:
    # servicemonitor.yaml selects on this label — keep them in sync.
    app: gemline-server
spec:
  type: ClusterIP
  selector:
    app: gemline-server
  ports:
    - name: http
      port: 80
      targetPort: http
