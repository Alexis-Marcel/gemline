apiVersion: v1
kind: Service
metadata:
  name: gemline-server
  namespace: gemline
  labels:
    # The ServiceMonitor in servicemonitor.yaml selects on this label to
    # discover the scrape endpoint — keep it in sync with that selector.
    app: gemline-server
spec:
  type: ClusterIP
  selector:
    app: gemline-server
  ports:
    - name: http
      port: 80
      targetPort: http
