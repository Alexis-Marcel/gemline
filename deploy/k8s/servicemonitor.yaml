# ServiceMonitor CRD comes from kube-prometheus-stack. The SkipDryRun
# annotation below avoids a fresh-sync failure when the CRD isn't
# registered yet.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gemline-server
  namespace: gemline
  labels:
    app: gemline-server
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  selector:
    matchLabels:
      app: gemline-server
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
