apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemline-web
  namespace: gemline
  labels:
    app: gemline-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gemline-web
  template:
    metadata:
      labels:
        app: gemline-web
    spec:
      # Spread replicas across nodes; ScheduleAnyway tolerates skew during rollouts.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gemline-web
      containers:
        - name: web
          image: ghcr.io/alexis-marcel/gemline-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          securityContext:
            # Don't drop ALL caps: the Caddy binary's cap_net_bind_service
            # file capability makes the kernel refuse to exec it (EPERM).
            allowPrivilegeEscalation: false
