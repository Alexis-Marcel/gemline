apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemline-web
  namespace: gemline
  labels:
    app: gemline-web
spec:
  # Stateless static-file server; safe to scale horizontally.
  replicas: 3
  selector:
    matchLabels:
      app: gemline-web
  template:
    metadata:
      labels:
        app: gemline-web
    spec:
      # Spread replicas across nodes so losing one node doesn't take down
      # the whole web tier. With replicas=3 and 2 nodes we get 2/1 split;
      # with 3+ nodes we get one per node. ScheduleAnyway means we
      # tolerate skew during rollouts instead of getting stuck.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gemline-web
      containers:
        - name: web
          image: ghcr.io/alexis-marcel/gemline-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          securityContext:
            # Caddy's image runs as root by default; running it non-root
            # would need a custom uid + writable /data emptyDir for its
            # config store. Static-file server behind the ingress with no
            # privilege escalation + all capabilities dropped is fine.
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
