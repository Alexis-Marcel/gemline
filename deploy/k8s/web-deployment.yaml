apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemline-web
  namespace: gemline
  labels:
    app: gemline-web
spec:
  # Stateless static-file server; safe to scale horizontally.
  replicas: 3
  selector:
    matchLabels:
      app: gemline-web
  template:
    metadata:
      labels:
        app: gemline-web
    spec:
      # Spread replicas across nodes so losing one node doesn't take down
      # the whole web tier. With replicas=3 and 2 nodes we get 2/1 split;
      # with 3+ nodes we get one per node. ScheduleAnyway means we
      # tolerate skew during rollouts instead of getting stuck.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gemline-web
      containers:
        - name: web
          image: ghcr.io/alexis-marcel/gemline-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          securityContext:
            # The Caddy binary has cap_net_bind_service set as a file
            # capability, so dropping all capabilities at the pod level
            # makes the kernel refuse to exec it (EPERM). The image runs
            # as root by default but the container is a plain static-file
            # server behind the ingress; allowPrivilegeEscalation:false
            # is enough hardening here.
            allowPrivilegeEscalation: false
