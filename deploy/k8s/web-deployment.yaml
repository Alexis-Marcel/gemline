apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemline-web
  namespace: gemline
  labels:
    app: gemline-web
spec:
  # Stateless static-file server; safe to scale horizontally.
  replicas: 2
  selector:
    matchLabels:
      app: gemline-web
  template:
    metadata:
      labels:
        app: gemline-web
    spec:
      containers:
        - name: web
          image: ghcr.io/alexis-marcel/gemline-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
